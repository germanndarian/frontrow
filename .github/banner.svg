<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" fill="none" role="img" aria-label="Frontrow — your teams, one screen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1018"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 -40) scale(620 460)">
      <stop stop-color="#3b6ef5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b6ef5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 0) scale(560 420)">
      <stop stop-color="#7c5cff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="120" y1="120" x2="760" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9fc0ff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glowA)"/>
  <rect width="1280" height="340" fill="url(#glowB)"/>

  <!-- faint yard lines -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2">
    <line x1="120" y1="40" x2="120" y2="300"/>
    <line x1="320" y1="40" x2="320" y2="300"/>
    <line x1="520" y1="40" x2="520" y2="300"/>
    <line x1="760" y1="40" x2="760" y2="300"/>
    <line x1="960" y1="40" x2="960" y2="300"/>
    <line x1="1160" y1="40" x2="1160" y2="300"/>
  </g>

  <!-- live chip -->
  <g transform="translate(112 86)">
    <rect x="0" y="0" width="92" height="30" rx="15" fill="#f0463c" fill-opacity="0.14"/>
    <circle cx="20" cy="15" r="5" fill="#f0463c"/>
    <text x="36" y="20" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#ff7b73">LIVE</text>
  </g>

  <!-- wordmark -->
  <text x="108" y="210" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="-2" fill="url(#ink)">Frontrow</text>

  <!-- tagline -->
  <text x="114" y="262" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" font-weight="600" letter-spacing="0.5" fill="#aab4c4">Your teams. One screen. <tspan fill="#6ea0ff">Front-row seats to the only games that matter — yours.</tspan></text>

  <!-- league ticker -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#6b7585">
    <text x="114" y="306">NFL</text>
    <text x="186" y="306">·</text>
    <text x="204" y="306">COLLEGE FOOTBALL</text>
    <text x="404" y="306">·</text>
    <text x="422" y="306">NHL</text>
    <text x="476" y="306">·</text>
    <text x="494" y="306">MLB</text>
  </g>
</svg>
