name: CI

# Quality gate for the codebase. Vercel handles deploys on push to main via its
# Git integration, so this workflow only lints, type-checks, tests, and builds.
# Runs on every pull request (any base branch) so faulty code can't merge.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
